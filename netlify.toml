# Fiaxe website — static export deployed to Netlify.
#
# Next.js is configured with `output: "export"` in next.config.ts, so
# `npm run build` writes the fully static site (HTML/CSS/JS + the audio in
# public/recordings) into the `out/` directory. We publish that directory.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  # Next.js 16 requires Node >= 20.9.
  NODE_VERSION = "20"
